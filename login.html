<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CloudSparkDigital Login Form</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<div class="card">
  <div class="brand">
    <div>
      <h1 class="title">Welcome To CloudSparkDigital </h1>
      <p class="subtitle">Login or create a new account.</p>
    </div>
  </div>

  <div class="tabs" role="tablist" aria-label="Authentication tabs">
    <button class="tab active" type="button" id="tabLogin" role="tab" aria-selected="true">Login</button>
    <button class="tab" type="button" id="tabRegister" role="tab" aria-selected="false">Register</button>
  </div>

  <form id="loginForm" novalidate class="form form-active" data-form="login">
    <div class="field">
      <label for="loginEmail">Email</label>
      <input id="loginEmail" type="email" placeholder="you@example.com" autocomplete="username" />
      <small class="error" id="loginEmailError"></small>
    </div>

    <div class="field">
      <label for="loginPassword">Password</label>
      <div class="password-row">
        <input id="loginPassword" type="password" placeholder="At least 6 characters" autocomplete="current-password" />
        <button type="button" class="toggle" id="toggleLoginPassword">Show</button>
      </div>
      <small class="error" id="loginPasswordError"></small>
    </div>

    <button class="primary" type="submit">Login</button>
    <p class="message" id="loginMessage"></p>
  </form>

  <form id="registerForm" novalidate class="form" data-form="register">
    <div class="field">
      <label for="regName">Full name</label>
      <input id="regName" type="text" placeholder="John Doe" autocomplete="name" />
      <small class="error" id="regNameError"></small>
    </div>

    <div class="field">
      <label for="regEmail">Email</label>
      <input id="regEmail" type="email" placeholder="you@example.com" autocomplete="email" />
      <small class="error" id="regEmailError"></small>
    </div>

    <div class="field">
      <label for="regPassword">Password</label>
      <div class="password-row">
        <input id="regPassword" type="password" placeholder="At least 6 characters" autocomplete="new-password" />
        <button type="button" class="toggle" id="toggleRegPassword">Show</button>
      </div>
      <small class="error" id="regPasswordError"></small>
    </div>

    <div class="field">
      <label for="regConfirmPassword">Confirm password</label>
      <div class="password-row">
        <input id="regConfirmPassword" type="password" placeholder="Re-enter password" autocomplete="new-password" />
        <button type="button" class="toggle" id="toggleRegConfirmPassword">Show</button>
      </div>
      <small class="error" id="regConfirmPasswordError"></small>
    </div>

    <button class="primary" type="submit">Create account</button>
    <p class="message" id="registerMessage"></p>
  </form>
</div>

  <script src="script.js"></script>
</body>
</html>
